name: Epic Games Freebie Tracker

on:
  schedule:
    - cron: '0 18 * * 4' # Automatically runs every Thursday at 6:00 PM UTC
  workflow_dispatch: # Manual test button

jobs:
  check-games:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Epic Games and Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          python3 -c "
          import urllib.request
          import json
          import os

          # Query Epic Games Store API
          url = 'https://epicgames.com'
          req = urllib.request.Request(url, headers={'User-Agent': 'Mozilla/5.0'})
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  elements = data['data']['Catalog']['searchStore']['elements']
                  
                  games = []
                  for item in elements:
                      promotions = item.get('promotions')
                      if promotions and promotions.get('promotionalOffers'):
                          offers = promotions['promotionalOffers'][0]['promotionalOffers']
                          for offer in offers:
                              if offer.get('discountSetting', {}).get('discountType') == 'PERCENTAGE' and offer.get('discountSetting', {}).get('discountPercentage') == 0:
                                  games.append(f\"🎮 *{item['title']}*\n🔗 https://epicgames.com{item.get('productSlug', item['urlSlug'] if item.get('urlSlug') else '')}\")
                  
                  if games:
                      message = '🎁 *New Free Epic Games Available\!*\n\n' + '\n\n'.join(games)
                      
                      # Send to Telegram Webhook
                      token = os.environ['TELEGRAM_TOKEN']
                      chat_id = os.environ['TELEGRAM_TO']
                      tele_url = f'https://telegram.org{token}/sendMessage'
                      tele_data = json.dumps({'chat_id': chat_id, 'text': message, 'parse_mode': 'MarkdownV2'}).encode('utf-8')
                      
                      tele_req = urllib.request.Request(tele_url, data=tele_data, headers={'Content-Type': 'application/json'})
                      urllib.request.urlopen(tele_req)
                      print('Notification sent successfully!')
                  else:
                      print('No free games found right now.')
          except Exception as e:
              print(f'Error occurred: {e}')
          "
