name: Epic Games Freebie Tracker

on:
  schedule:
    - cron: '0 18 * * 4' # Automatically runs every Thursday at 6:00 PM UTC
  workflow_dispatch: # Manual test button

jobs:
  check-games:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Epic Games and Send to Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_TO: ${{ secrets.TELEGRAM_TO }}
        run: |
          python3 - <<'EOF'
          import urllib.request
          import urllib.error
          import json
          import os
          import html

          # Query Epic Games Store API
          url = 'https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=en-US&country=US&allowCountries=US'
          
          headers = {
              'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36',
              'Referer': 'https://store.epicgames.com/',
              'Accept': 'application/json',
              'Accept-Language': 'en-US,en;q=0.9',
          }
          
          req = urllib.request.Request(url, headers=headers)
          
          try:
              with urllib.request.urlopen(req) as response:
                  data = json.loads(response.read().decode())
                  elements = data['data']['Catalog']['searchStore']['elements']
                  
                  games = []
                  for item in elements:
                      promotions = item.get('promotions')
                      if promotions and promotions.get('promotionalOffers'):
                          # Loop through the active promotions to find free items (100% discount / 0 price)
                          for promo_group in promotions['promotionalOffers']:
                              for offer in promo_group.get('promotionalOffers', []):
                                  discount = offer.get('discountSetting', {})
                                  if discount.get('discountType') == 'PERCENTAGE' and discount.get('discountPercentage') == 0:
                                      title = item.get('title', 'Unknown Game')
                                      
                                      # Resolve the correct human-readable URL slug
                                      slug = None
                                      catalog_ns = item.get('catalogNs')
                                      if catalog_ns:
                                          mappings = catalog_ns.get('mappings')
                                          if mappings:
                                              # 1. Search mappings for 'productHome' page type
                                              for mapping in mappings:
                                                  if mapping.get('pageType') == 'productHome':
                                                      slug = mapping.get('pageSlug')
                                                      break
                                              # 2. Fallback to the first mapping if productHome is not found
                                              if not slug and len(mappings) > 0:
                                                  slug = mappings[0].get('pageSlug')
                                      
                                      # 3. Fallback to productSlug or urlSlug
                                      if not slug:
                                          slug = item.get('productSlug') or item.get('urlSlug')
                                      
                                      # Clean slug if it contains /home (e.g. from fallback)
                                      if slug and slug.endswith('/home'):
                                          slug = slug[:-5]
                                          
                                      if slug:
                                          game_url = f"https://store.epicgames.com/p/{slug}"
                                      else:
                                          game_url = "https://store.epicgames.com/free-games"
                                          
                                      # Format with safe HTML tags for Telegram
                                      games.append(f"🎮 <b>{html.escape(title)}</b>\n🔗 {html.escape(game_url)}")
                  
                  if games:
                      message = '🎁 <b>New Free Epic Games Available!</b>\n\n' + '\n\n'.join(games)
                      
                      # Clean and sanitize the Telegram Token
                      raw_token = os.environ.get('TELEGRAM_TOKEN', '').strip()
                      token = raw_token.lstrip('/').replace('bot', '', 1).lstrip('/')
                      
                      chat_id = os.environ.get('TELEGRAM_TO', '').strip()
                      tele_url = f'https://api.telegram.org/bot{token}/sendMessage'
                      
                      tele_payload = json.dumps({
                          'chat_id': chat_id, 
                          'text': message, 
                          'parse_mode': 'HTML'
                      }).encode('utf-8')
                      
                      tele_req = urllib.request.Request(
                          tele_url, 
                          data=tele_payload, 
                          headers={'Content-Type': 'application/json'}
                      )
                      urllib.request.urlopen(tele_req)
                      print('Notification sent successfully!')
                  else:
                      print('No free games found right now.')
          except urllib.error.HTTPError as e:
              print(f'HTTP Error {e.code}: {e.reason}')
              try:
                  print(f'Response Body: {e.read().decode("utf-8")}')
              except Exception:
                  pass
          except Exception as e:
              print(f'Error occurred: {e}')
          EOF
